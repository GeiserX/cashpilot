# CashPilot - Standalone / Monitor-Only Mode
# https://github.com/GeiserX/CashPilot
#
# This configuration runs CashPilot WITHOUT Docker socket access.
# Use this if you prefer to manage service containers yourself via
# Portainer, manual docker compose, or any other tooling.
#
# In this mode CashPilot provides:
#   - Service catalog with signup links and configuration details
#   - Compose file export (download ready-to-use docker-compose.yml per service)
#   - Earnings dashboard and historical tracking (via API collectors)
#   - Credential storage for your service accounts
#
# It will NOT be able to:
#   - Deploy or stop containers directly
#   - Show live container health (CPU, memory, status)
#
# To deploy services, use the "Export Compose" button in the UI, then
# run the generated file with your preferred Docker tooling.

services:
  cashpilot:
    image: drumsergio/cashpilot:latest
    container_name: cashpilot
    ports:
      - "8080:8080"
    volumes:
      - cashpilot_data:/data
    environment:
      - TZ=${TZ:-UTC}
      - CASHPILOT_SECRET_KEY=${CASHPILOT_SECRET_KEY:-}
    init: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64M

volumes:
  cashpilot_data:
