name: PacketStream
slug: packetstream
category: bandwidth
status: active
website: https://packetstream.io
description: >
  PacketStream is a peer-to-peer bandwidth marketplace where you can sell your
  unused bandwidth. It powers a residential proxy network used for market research,
  SEO monitoring, and ad verification. Simple Docker setup with just a CID
  (Client ID) required. Note that CAPTCHA-protected login can make automated
  earnings collection challenging.
short_description: Bandwidth sharing - simple CID-based setup

referral:
  signup_url: "https://packetstream.io/?psr=7xgZ"

docker:
  image: packetstream/psclient
  platforms: [linux/amd64]
  env:
    - key: CID
      label: "Client ID"
      required: true
      secret: false
      description: "Your PacketStream Client ID (found in Dashboard > Setup)"
  ports: []
  volumes: []
  command: ""
  network_mode: ""
  privileged: true

requirements:
  residential_ip: true
  min_bandwidth: ""
  gpu: false
  min_storage: ""

payment:
  methods: [paypal]
  minimum_payout: "$5"
  currency: USD
  frequency: "On request"

earnings:
  monthly_low: 0
  monthly_high: 4
  currency: USD
  per: "device"
  notes: "Pays $0.10/GB for bandwidth shared. Earnings depend heavily on demand for your IP's location."

cashout:
  method: redirect
  dashboard_url: "https://packetstream.io/dashboard"
  min_amount: 5.0
  currency: USD

platforms: [docker, windows, linux, android]

collector:
  type: scrape
  notes: "Dashboard is CAPTCHA-protected. May need manual JWT from browser session for API access."
