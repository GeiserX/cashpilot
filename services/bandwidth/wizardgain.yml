name: WizardGain
slug: wizardgain
category: bandwidth
status: active
website: https://wizardgain.com
description: >
  WizardGain turns your unused internet bandwidth into a recurring revenue stream.
  Uses email-based authentication. Pays in cryptocurrency. Official Docker image
  available as wizardgain/worker.
short_description: Bandwidth sharing - crypto payout, email auth

referral:
  signup_url: "https://wizardgain.com"
  bonus:
    referrer: ""
    referee: ""

docker:
  image: wizardgain/worker
  platforms: [linux/amd64, linux/arm64]
  env:
    - key: EMAIL
      label: "Email"
      required: true
      secret: false
      description: "Your WizardGain account email"
  ports: []
  volumes: []
  command: ""
  network_mode: ""

requirements:
  residential_ip: true
  min_bandwidth: ""
  gpu: false
  min_storage: ""

payment:
  methods: [crypto]
  minimum_payout: "$5"
  currency: USD
  frequency: "On request"

earnings:
  monthly_low: 1
  monthly_high: 4
  currency: USD
  per: "device"
  notes: "Crypto payouts. Earnings depend on location and bandwidth demand."

cashout:
  method: redirect
  dashboard_url: "https://wizardgain.com/dashboard"
  min_amount: 5.0
  currency: USD

platforms: [windows, linux, docker]

collector:
  type: manual
  notes: "No known public API for earnings."
