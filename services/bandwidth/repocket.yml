name: Repocket
slug: repocket
category: bandwidth
status: active
website: https://repocket.com
description: >
  Repocket lets you earn passive income by sharing your unused internet bandwidth.
  Residential IP required (ToS prohibits VPS, proxies, and VPNs). Max 5 devices
  and 5 active sessions per account. Setup requires an email and API key from the
  dashboard. The Docker image uses environment variables directly.
short_description: Bandwidth sharing - residential only, max 5 devices, env-based auth

referral:
  url_template: ""
  code: ""
  signup_url: "https://repocket.com/"
  bonus:
    referrer: ""
    referee: ""
  how_to_get_code: "No public referral program found as of March 2025"

docker:
  image: repocket/repocket
  platforms: [linux/amd64, linux/arm64]
  env:
    - key: RP_EMAIL
      label: "Email"
      required: true
      secret: false
      description: "Your Repocket account email"
    - key: RP_API_KEY
      label: "API Key"
      required: true
      secret: true
      description: "Your Repocket API key (found in Dashboard > API Key section)"
  ports: []
  volumes: []
  command: ""
  network_mode: ""
  privileged: true

requirements:
  residential_ip: true
  min_bandwidth: ""
  gpu: false
  min_storage: ""

payment:
  methods: [paypal, crypto]
  minimum_payout: "$20"
  currency: USD
  frequency: "On request"

earnings:
  monthly_low: 1
  monthly_high: 4
  currency: USD
  per: "device"
  notes: "Residential IPs earn more. VPS/datacenter IPs accepted but at lower rates."

cashout:
  method: redirect
  dashboard_url: "https://app.repocket.com/dashboard"
  min_amount: 20.0
  currency: USD

platforms: [windows, macos, linux, android, docker]

collector:
  type: api
  notes: "Dashboard API with API key authentication. Per-device earnings visible."
