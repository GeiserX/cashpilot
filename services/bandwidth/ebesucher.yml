name: Ebesucher
slug: ebesucher
category: bandwidth
status: active
website: https://www.ebesucher.com
description: >
  Ebesucher is a traffic exchange platform where you earn credits by visiting
  websites through an automated surfbar. Runs in a headless browser container
  (Firefox or Chromium). Not a traditional bandwidth-sharing service — it
  generates traffic by browsing websites automatically. Requires a browser
  container which uses more resources than typical bandwidth apps.
short_description: Traffic exchange surfbar - browser-based, auto website visits

referral:
  url_template: ""
  code: ""
  signup_url: "https://www.ebesucher.com"
  bonus:
    referrer: ""
    referee: ""

docker:
  image: jlesage/firefox
  platforms: [linux/amd64]
  env:
    - key: EBESUCHER_USERNAME
      label: "Username"
      required: true
      secret: false
      description: "Your Ebesucher username for the surfbar URL"
    - key: VNC_PASSWORD
      label: "VNC Password"
      required: false
      secret: true
      description: "Password for VNC access to the browser"
      default: "cashpilot"
  ports:
    - "5800:5800"
  volumes:
    - "ebesucher-data:/config"
  command: ""
  network_mode: ""

requirements:
  residential_ip: false
  min_bandwidth: ""
  gpu: false
  min_storage: ""

payment:
  methods: [paypal]
  minimum_payout: "$2"
  currency: EUR
  frequency: "On request"

earnings:
  monthly_low: 0.50
  monthly_high: 2
  currency: EUR
  per: "device"
  notes: "Earnings in BTP points convertible to EUR. Uses significant CPU/memory for browser. Needs periodic restart."

cashout:
  method: redirect
  dashboard_url: "https://www.ebesucher.com/account"
  min_amount: 2.0
  currency: EUR
  notes: "Euro payout via PayPal or bank transfer."

platforms: [linux, docker]

collector:
  type: manual
  notes: "No API. Earnings visible in Ebesucher dashboard only."
