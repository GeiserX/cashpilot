name: ProxyBase
slug: proxybase
category: bandwidth
status: active
website: https://proxybase.io
description: >
  ProxyBase is a bandwidth-sharing platform that pays users in cryptocurrency for
  sharing their unused internet connection. Uses a simple user ID-based authentication
  system. Works on residential connections. Official Docker image available.
short_description: Bandwidth sharing - crypto payout, user ID auth

referral:
  signup_url: "https://peer.proxybase.org?referral=nXzS3c6iTO"

docker:
  image: proxybase/proxybase
  platforms: [linux/amd64]
  env:
    - key: USER_ID
      label: "User ID"
      required: true
      secret: false
      description: "Your ProxyBase user ID from the dashboard"
    - key: DEVICE_NAME
      label: "Device Name"
      required: false
      secret: false
      description: "Name shown in your ProxyBase dashboard"
      default: "cashpilot-{hostname}"
  ports: []
  volumes: []
  command: ""
  network_mode: ""

requirements:
  residential_ip: true
  min_bandwidth: ""
  gpu: false
  min_storage: ""

payment:
  methods: [crypto]
  minimum_payout: "$1"
  currency: USD
  frequency: "On request"

earnings:
  monthly_low: 1
  monthly_high: 5
  currency: USD
  per: "device"
  notes: "Crypto payouts. Earnings depend on location and bandwidth usage."

cashout:
  method: redirect
  dashboard_url: "https://peer.proxybase.org/dashboard"
  min_amount: 1.0
  currency: USD

platforms: [windows, linux]

collector:
  type: manual
  notes: "No known public API for earnings."
