name: Adnade
slug: adnade
category: bandwidth
status: active
website: https://adnade.com
description: >
  Adnade is an ad-based passive income service. You earn by running an automated
  browser that views advertisements. Requires a headless browser container (Firefox)
  with a specific surfbar URL. Uses more resources than traditional bandwidth apps
  due to the browser requirement.
short_description: Ad-based earning - browser surfbar, views ads automatically

referral:
  url_template: ""
  code: ""
  signup_url: "https://adnade.com"
  bonus:
    referrer: ""
    referee: ""

docker:
  image: jlesage/firefox
  platforms: [linux/amd64]
  env:
    - key: ADNADE_USERNAME
      label: "Username"
      required: true
      secret: false
      description: "Your Adnade username for the view URL"
    - key: VNC_PASSWORD
      label: "VNC Password"
      required: false
      secret: true
      description: "Password for VNC access to the browser"
      default: "cashpilot"
  ports:
    - "5900:5900"
  volumes:
    - "adnade-data:/config"
  command: ""
  network_mode: ""

requirements:
  residential_ip: false
  min_bandwidth: ""
  gpu: false
  min_storage: ""

payment:
  methods: [paypal, crypto]
  minimum_payout: "$5"
  currency: USD
  frequency: "On request"

earnings:
  monthly_low: 0.50
  monthly_high: 2
  currency: USD
  per: "device"
  notes: "Ad-view based. Uses significant CPU/memory for browser. May need periodic restart."

cashout:
  method: redirect
  dashboard_url: "https://adnade.com/dashboard"
  min_amount: 5.0
  currency: USD

platforms: [linux, docker]

collector:
  type: manual
  notes: "No API. Earnings visible in dashboard only."
