name: Bitping
slug: bitping
category: bandwidth
status: active
website: https://app.bitping.com
description: >
  Bitping is a decentralized network monitoring platform that pays you for running
  a node. Your node performs website monitoring, latency testing, and network
  quality checks for Bitping's customers. Works on both residential and VPS
  connections. The Docker image requires interactive initial setup to authenticate,
  then persists credentials in a volume mount.
short_description: Bandwidth sharing - decentralized network monitoring, works on VPS

referral:
  signup_url: "https://app.bitping.com"

docker:
  image: bitping/bitpingd
  platforms: [linux/amd64, linux/arm64]
  env: []
  ports: []
  volumes:
    - "bitping-data:/root/.bitping"
  command: ""
  network_mode: ""
  privileged: true
  notes: >
    Initial authentication is interactive via the container's web UI.
    Credentials are then persisted in the /root/.bitping volume mount.
    No environment variables are needed.

requirements:
  residential_ip: false
  min_bandwidth: ""
  gpu: false
  min_storage: ""

payment:
  methods: [crypto]
  crypto_token: SOL
  minimum_payout: "$5"
  currency: USD
  frequency: "On request"

earnings:
  monthly_low: 0
  monthly_high: 5
  currency: USD
  per: "device"
  notes: "Earnings depend on network quality and demand for monitoring from your location. VPS nodes accepted."

cashout:
  method: redirect
  dashboard_url: "https://app.bitping.com/dashboard"
  min_amount: 5.0
  currency: USD

platforms: [docker, windows, macos, linux]

collector:
  type: api
  notes: "Dashboard at app.bitping.com. Credentials persisted in /root/.bitping volume."
