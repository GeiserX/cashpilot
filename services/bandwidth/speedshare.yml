name: SpeedShare
slug: speedshare
category: bandwidth
status: broken
website: https://speedshare.app
description: >
  SpeedShare lets you earn by sharing your unused internet bandwidth. Residential
  IPs only - datacenter and VPS connections are not accepted. There is no official
  Docker image; the community image (mrcolorrain) provides container support with
  a referral code and UUID-based authentication.
short_description: Bandwidth sharing - residential only, no official Docker

referral:
  signup_url: "https://speedshare.app"

docker:
  image: mrcolorrain/speedshare
  platforms: [linux/amd64]
  env:
    - key: CODE
      label: "Authorization Code"
      required: true
      secret: true
      description: "Your SpeedShare authorization code from the dashboard"
    - key: SPEEDSHARE_UUID
      label: "Device UUID"
      required: false
      secret: false
      description: "Unique device identifier. Auto-generated if not provided."
      default: ""
  ports: []
  volumes: []
  command: ""
  network_mode: ""

requirements:
  residential_ip: true
  min_bandwidth: ""
  gpu: false
  min_storage: ""

payment:
  methods: [crypto, paypal]
  minimum_payout: "$5"
  currency: USD
  frequency: "On request"

earnings:
  monthly_low: 0
  monthly_high: 3
  currency: USD
  per: "device"
  notes: "Residential IPs only. No official Docker image - uses community build. API at api.speedshare.app is broken (returns Telegraf metrics instead of JSON). Service appears non-functional as of March 2025."

cashout:
  method: manual
  dashboard_url: "https://dashboard.speedshare.app"
  min_amount: 5.0
  currency: USD
  notes: "Service broken. Cashout unavailable."

platforms: [windows, macos, linux]

collector:
  type: manual
  notes: "No official API. Community Docker image. Manual earnings tracking via dashboard."
