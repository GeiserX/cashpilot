name: Spide
slug: spide
category: bandwidth
status: active
website: https://spide.app
description: >
  Spide is a bandwidth-sharing service that lets you monetize unused internet
  bandwidth. Uses an optional machine ID for device tracking. Available through
  community Docker images from the income-generator project.
short_description: Bandwidth sharing - machine ID based

referral:
  signup_url: "https://spide.app"
  bonus:
    referrer: ""
    referee: ""

docker:
  image: ""
  platforms: []
  env:
    - key: SPIDE_MACHINE_ID
      label: "Machine ID"
      required: false
      secret: false
      description: "Machine ID for existing device already registered (auto-generated if empty)"
  ports: []
  volumes: []
  command: ""
  network_mode: ""

requirements:
  residential_ip: true
  min_bandwidth: ""
  gpu: false
  min_storage: ""

payment:
  methods: [crypto]
  minimum_payout: "$5"
  currency: USD
  frequency: "On request"

earnings:
  monthly_low: 1
  monthly_high: 3
  currency: USD
  per: "device"
  notes: "Limited information available. Earnings depend on location."

cashout:
  method: redirect
  dashboard_url: "https://spide.network/dashboard"
  min_amount: 5.0
  currency: USD

platforms: [windows, linux]

collector:
  type: manual
  notes: "No official Docker image or public API found."
