name: MystNodes
slug: mysterium
category: bandwidth
status: active
website: https://mystnodes.com
description: >
  MystNodes (Mysterium Network) is a decentralized VPN and proxy network built on
  blockchain technology. You earn MYST tokens by running a node that provides VPN,
  proxy, and data scraping services to users. Requires NET_ADMIN capability and
  host networking for full functionality. Includes a built-in web UI for node
  management. Works on both residential and VPS connections.
short_description: Decentralized VPN node - blockchain-based, works on VPS

referral:
  signup_url: "https://mystnodes.co/?referral_code=do7v7YOoBBpbOstKQovX2pUvZYKia4ZhH3QIdNtE"
  bonus:
    referrer: "5% bonus on referral earnings"
    referee: ""

docker:
  image: mysteriumnetwork/myst
  platforms: [linux/amd64, linux/arm64]
  env: []
  ports:
    - "4449:4449"
  volumes:
    - "mysterium-data:/var/lib/mysterium-node"
  command: "service --agreed-terms-and-conditions"
  network_mode: "host"
  cap_add: [NET_ADMIN]
  privileged: true

requirements:
  residential_ip: false
  devices_per_ip: 0
  min_bandwidth: ""
  gpu: false
  min_storage: ""

payment:
  methods: [crypto]
  minimum_payout: "$2"
  currency: MYST
  frequency: "On request"

earnings:
  monthly_low: 2
  monthly_high: 10
  currency: USD
  per: "device"
  notes: "Earnings in MYST tokens. Residential IPs earn significantly more. Node WebUI at port 4449 for management. VPS accepted."

cashout:
  method: redirect
  dashboard_url: "https://mystnodes.com/dashboard"
  min_amount: 2.0
  currency: MYST
  notes: "MYST tokens settle on-chain. Withdraw from MyST node dashboard to your wallet."

platforms: [windows, macos, linux, docker]

collector:
  type: api
  notes: "Tequila API at http://localhost:4449/tequilapi/settlement/total-fees. Returns MYST in wei (10^18). No auth needed."
