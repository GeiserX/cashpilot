name: Honeygain
slug: honeygain
category: bandwidth
status: active
website: https://www.honeygain.com
description: >
  Share your unused internet bandwidth and earn passive income. Honeygain routes
  web intelligence, content delivery, and market research traffic through your
  connection. One of the most established bandwidth-sharing platforms with 12M+
  users and over 1M payouts completed.
short_description: Bandwidth sharing - most established platform

referral:
  signup_url: "https://dashboard.honeygain.com/ref/SERGIB4014"
  bonus:
    referrer: "25% of referral earnings for life"
    referee: "$3 signup bonus"

docker:
  image: honeygain/honeygain
  platforms: [linux/amd64]
  env:
    - key: HONEYGAIN_EMAIL
      label: "Email"
      required: true
      secret: false
      description: "Your Honeygain account email"
    - key: HONEYGAIN_PASSWORD
      label: "Password"
      required: true
      secret: true
      description: "Your Honeygain account password"
    - key: HONEYGAIN_DEVICE_NAME
      label: "Device name"
      required: false
      secret: false
      description: "Name shown in your Honeygain dashboard"
      default: "cashpilot-{hostname}"
  ports: []
  volumes: []
  command: "-tou-accept -email ${HONEYGAIN_EMAIL} -pass ${HONEYGAIN_PASSWORD} -device ${HONEYGAIN_DEVICE_NAME}"
  network_mode: ""
  privileged: true

requirements:
  residential_ip: true
  devices_per_account: 10
  min_bandwidth: ""
  gpu: false
  min_storage: ""

payment:
  methods: [paypal, crypto]
  minimum_payout: "$20"
  currency: USD
  frequency: "On request"

earnings:
  monthly_low: 2
  monthly_high: 5
  currency: USD
  per: "device"
  notes: "Varies by location. US/EU IPs earn more. Max 10 devices per account."

cashout:
  method: redirect
  dashboard_url: "https://dashboard.honeygain.com/earnings"
  min_amount: 20.0
  currency: USD
  notes: "PayPal payout or BTC/JumpToken via dashboard. Lucky Pot daily bonus available."

platforms: [windows, macos, linux, android, docker]

collector:
  type: api
  notes: "JWT auth via /v1/users/me and /v2/earnings endpoints"
