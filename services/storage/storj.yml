name: Storj
slug: storj
category: storage
status: active
website: https://www.storj.io
description: >
  Storj is a decentralized cloud storage network where you earn by renting out
  your unused disk space. Run the storage node via Docker and get paid approximately
  $1.50/TB stored per month plus $2/TB egress. Payments are in STORJ token or via
  zkSync L2. Requires at least 550GB of available disk space and a stable internet
  connection. One of the most mature and truly passive storage income services.
  No account or signup needed -- nodes are permissionless since mid-2025.
short_description: Decentralized storage node - ~$1.50/TB stored + $2/TB egress

referral:
  signup_url: "https://storj.dev/node/get-started/setup"

docker:
  image: storj/storagenode
  platforms: [linux/amd64, linux/arm64]
  env:
    - key: WALLET
      label: "Wallet address"
      required: true
      secret: false
      description: "ERC-20 wallet address for STORJ token payouts (e.g. 0x1234...abcd). Must be self-custodial (MetaMask, Ledger, etc.) -- never use an exchange address"
    - key: EMAIL
      label: "Email"
      required: true
      secret: false
      description: "Email address for operator notifications"
    - key: ADDRESS
      label: "External address"
      required: true
      secret: false
      description: "Your public IP or DDNS hostname with port (e.g. 84.54.27.229:28967). Port 28967 must be forwarded (TCP+UDP)"
    - key: STORAGE
      label: "Storage allocation"
      required: true
      secret: false
      description: "Maximum disk space to allocate (e.g. 2TB). Use spinning disks (HDD), not SSD"
      default: "1TB"
    - key: IDENTITY_DIR
      label: "Identity directory"
      required: true
      secret: false
      description: "Host path where identity files are stored (must contain ca.cert, ca.key, identity.cert, identity.key)"
    - key: STORAGE_DIR
      label: "Storage directory"
      required: true
      secret: false
      description: "Host path on a spinning disk (HDD) for Storj data storage. Needs at least 550GB free"
  ports: ["28967:28967/tcp", "28967:28967/udp", "14002:14002"]
  volumes:
    - "${IDENTITY_DIR}:/app/identity"
    - "${STORAGE_DIR}:/app/config"
  command: "--operator.wallet-features=zksync-era"
  network_mode: ""
  notes: >
    No signup or auth token required (permissionless since mid-2025).
    Identity must be pre-generated using the identity binary (proof-of-work to difficulty 36, takes hours).
    Use spinning disks for storage. Port 28967 TCP+UDP must be forwarded.
    Local dashboard available at port 14002.

requirements:
  residential_ip: false
  note: "Storj nodes on the same /24 subnet share data allocation, reducing per-node earnings."
  note_column: devices_per_ip
  min_bandwidth: "5 Mbps upload"
  gpu: false
  min_storage: "550GB"

payment:
  methods: [crypto]
  minimum_payout: "$4"
  currency: STORJ
  frequency: "Monthly"

earnings:
  monthly_low: 0
  monthly_high: 15
  currency: USD
  per: "TB"
  notes: "~$1.50/TB stored + $2/TB egress + $2.74/TB audit/repair. Earnings scale with disk allocated and node age. First 9 months have held-back escrow. Port 28967 must be forwarded."

cashout:
  method: redirect
  dashboard_url: "http://localhost:14002"
  min_amount: 4.0
  currency: STORJ
  notes: "Payouts sent monthly in STORJ tokens to configured wallet address. Dashboard at port 14002."

platforms: [docker, windows, linux]

collector:
  type: api
  notes: "Local dashboard at port 14002. API at /api/sno for node stats, earnings, bandwidth. No auth needed on local interface."
