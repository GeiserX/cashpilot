# CashPilot - Self-hosted passive income orchestrator
# https://github.com/GeiserX/CashPilot
#
# Default: standalone mode (UI + Worker combined on one server).
# For multi-server fleet, see docker-compose.fleet.yml

services:
  cashpilot:
    build: .
    image: drumsergio/cashpilot:latest
    container_name: cashpilot
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - cashpilot_data:/data
    environment:
      - TZ=${TZ:-UTC}
      - CASHPILOT_SECRET_KEY=${CASHPILOT_SECRET_KEY:-}
      # Mode: standalone (default), ui, or worker
      - CASHPILOT_MODE=${CASHPILOT_MODE:-standalone}
    init: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64M

volumes:
  cashpilot_data:
