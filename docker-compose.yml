# CashPilot - Self-hosted passive income orchestrator
# https://github.com/GeiserX/CashPilot
#
# This is the RECOMMENDED configuration with Docker socket access.
# CashPilot can deploy, monitor, and manage service containers directly.
#
# For a version WITHOUT Docker socket access (monitor-only mode), see:
#   docker-compose.standalone.yml

services:
  cashpilot:
    build: .
    image: drumsergio/cashpilot:latest
    container_name: cashpilot
    ports:
      - "8080:8080"
    volumes:
      # Docker socket: gives CashPilot the ability to deploy and manage
      # service containers. Remove this line for monitor-only mode.
      - /var/run/docker.sock:/var/run/docker.sock
      - cashpilot_data:/data
    environment:
      - TZ=${TZ:-UTC}
      - CASHPILOT_SECRET_KEY=${CASHPILOT_SECRET_KEY:-}
    init: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64M

volumes:
  cashpilot_data:
